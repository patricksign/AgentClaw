services:

  # ─── AgentClaw Backend ─────────────────────────────────────────────────────
  agentclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentclaw
    restart: unless-stopped
    ports:
      - "8080:8080"         # API + WebSocket + Dashboard
    env_file:
      - .env                # API keys — copy from .env.example
    environment:
      ADDR:         ":8080"
      DB_PATH:      "/app/data/agentclaw.db"
      PROJECT_PATH: "/app/memory/project.md"
      STATE_PATH:   "/app/state"
      MEMORY_PATH:  "/app/memory"
      TZ:           "Asia/Ho_Chi_Minh"
    volumes:
      # Persistent data — survives container restart
      - ./data:/app/data          # SQLite database
      - ./memory:/app/memory      # project.md + agent docs
      - ./state:/app/state        # agent state files
      - ./static:/app/static      # dashboard HTML
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/metrics/today"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - agentclaw-net

  # ─── ngrok tunnel (optional, expose local to internet for Telegram webhook) ─
  # Uncomment if you need Telegram to reach your local dev server
  #
  # ngrok:
  #   image: ngrok/ngrok:latest
  #   container_name: agentclaw-ngrok
  #   command: http agentclaw:8080
  #   environment:
  #     NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
  #   ports:
  #     - "4040:4040"       # ngrok dashboard
  #   depends_on:
  #     - agentclaw
  #   networks:
  #     - agentclaw-net

networks:
  agentclaw-net:
    driver: bridge

volumes:
  agentclaw-data:
