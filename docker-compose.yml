services:

  # ─── AgentClaw Backend ─────────────────────────────────────────────────────
  agentclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentclaw
    restart: unless-stopped
    ports:
      - "${ADDR_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      ADDR:          ":8080"
      DB_PATH:       "/app/data/agentclaw.db"
      PROJECT_PATH:  "/app/memory/project.md"
      STATE_PATH:    "/app/state"
      PRICING_PATH:  "/app/pricing/agent-pricing.json"
      AGENTS_CONFIG: "/app/config/agents.json"
      TZ:            "Asia/Ho_Chi_Minh"
    volumes:
      - agentclaw-data:/app/data
      - ./memory:/app/memory
      - ./state:/app/state
      - ./static:/app/static
      - ./pricing:/app/pricing
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - agentclaw-net
    depends_on:
      sqlite-web:
        condition: service_started

  # ─── SQLite Web UI (optional — browse DB in browser) ────────────────────────
  sqlite-web:
    image: coleifer/sqlite-web:latest
    container_name: agentclaw-sqlite-web
    restart: unless-stopped
    ports:
      - "${SQLITE_WEB_PORT:-8081}:8080"
    environment:
      SQLITE_DATABASE: /data/agentclaw.db
    volumes:
      - agentclaw-data:/data
    networks:
      - agentclaw-net
    profiles:
      - debug

  # ─── ngrok tunnel (optional — expose to internet for Telegram webhook) ──────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: agentclaw-ngrok
    command: http agentclaw:8080
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - agentclaw
    networks:
      - agentclaw-net
    profiles:
      - tunnel

volumes:
  agentclaw-data:
    driver: local

networks:
  agentclaw-net:
    driver: bridge
